<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
    }
    .question-card {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      border-radius: 8px;
      padding: 16px;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #1a1a1a;
    }
    .question-text {
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #666;
    }
    .category {
      font-weight: 600;
      color: #856404;
    }
  </style>
</head>
<body>
  <div id="question-widget"></div>
  
  <script>
    function render() {
      const data = window.openai?.toolOutput?.structuredContent;
      
      if (!data || !data.question) {
        console.warn('Question widget: No data available yet');
        return;
      }
      
      const widget = document.getElementById('question-widget');
      if (!widget) return;
      
      let html = '<div class="question-card">';
      html += '<h2>Open Question Added</h2>';
      html += '<div class="question-text">' + escapeHtml(data.question) + '</div>';
      html += '<div class="meta">';
      
      if (data.category) {
        html += '<span class="category">' + escapeHtml(data.category) + '</span>';
      }
      
      if (data.timestamp) {
        html += '<span>' + escapeHtml(data.timestamp) + '</span>';
      }
      
      html += '</div>';
      html += '</div>';
      
      widget.innerHTML = html;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Render on load and retry if data not ready
    render();
    if (!window.openai?.toolOutput) {
      setTimeout(render, 100);
    }
  </script>
</body>
</html>
