<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
    }
    .context-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #1a1a1a;
    }
    .context-content {
      color: #1a1a1a;
      line-height: 1.6;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="context-widget"></div>
  
  <script>
    function render() {
      const data = window.openai?.toolOutput?.structuredContent;
      
      if (!data || !data.context) {
        console.warn('Context widget: No data available yet');
        return;
      }
      
      const widget = document.getElementById('context-widget');
      if (!widget) return;
      
      let html = '<div class="context-card">';
      html += '<h2>Strategic Context</h2>';
      html += '<div class="context-content">' + escapeHtml(data.context) + '</div>';
      html += '</div>';
      
      widget.innerHTML = html;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Render on load and retry if data not ready
    render();
    if (!window.openai?.toolOutput) {
      setTimeout(render, 100);
    }
  </script>
</body>
</html>
