<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
    }
    .search-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
      color: #1a1a1a;
    }
    .query {
      color: #666;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .results {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .result-item {
      background: white;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      border: 1px solid #e0e0e0;
    }
    .result-file {
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .result-snippet {
      color: #666;
      font-size: 13px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="search-widget"></div>
  
  <script>
    const data = window.openai && window.openai.toolOutput && window.openai.toolOutput.structuredContent;
    
    if (data) {
      const widget = document.getElementById('search-widget');
      
      let html = '<div class="search-card">';
      html += '<h2>Search Results</h2>';
      
      if (data.query) {
        html += '<div class="query">Query: "' + escapeHtml(data.query) + '"</div>';
      }
      
      if (data.results && data.results.length > 0) {
        html += '<ul class="results">';
        data.results.forEach(result => {
          html += '<li class="result-item">';
          html += '<div class="result-file">' + escapeHtml(result.file || 'Unknown file') + '</div>';
          if (result.snippet) {
            html += '<div class="result-snippet">' + escapeHtml(result.snippet) + '</div>';
          }
          html += '</li>';
        });
        html += '</ul>';
      } else {
        html += '<div class="query">No results found</div>';
      }
      
      html += '</div>';
      
      widget.innerHTML = html;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
