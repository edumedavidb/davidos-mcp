<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
    }
    .file-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
      color: #1a1a1a;
    }
    .file-path {
      color: #666;
      font-size: 13px;
      font-family: monospace;
      margin-bottom: 16px;
    }
    .file-content {
      background: white;
      border-radius: 6px;
      padding: 12px;
      color: #1a1a1a;
      line-height: 1.6;
      white-space: pre-wrap;
      font-size: 14px;
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="file-widget"></div>
  
  <script>
    const data = window.openai && window.openai.toolOutput && window.openai.toolOutput.structuredContent;
    
    if (data) {
      const widget = document.getElementById('file-widget');
      
      let html = '<div class="file-card">';
      html += '<h2>File Content</h2>';
      
      if (data.path) {
        html += '<div class="file-path">' + escapeHtml(data.path) + '</div>';
      }
      
      if (data.content) {
        html += '<div class="file-content">' + escapeHtml(data.content) + '</div>';
      }
      
      html += '</div>';
      
      widget.innerHTML = html;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
