<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
    }
    .decision-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #1a1a1a;
    }
    .section {
      margin-bottom: 12px;
    }
    .label {
      font-weight: 600;
      color: #666;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .content {
      color: #1a1a1a;
      line-height: 1.5;
    }
    .options {
      list-style: none;
      padding: 0;
      margin: 8px 0;
    }
    .options li {
      padding: 4px 0;
      color: #1a1a1a;
    }
    .options li:before {
      content: "• ";
      color: #666;
      font-weight: bold;
      margin-right: 8px;
    }
    .timestamp {
      color: #999;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div id="decision-widget"></div>
  
  <script>
    const data = window.openai && window.openai.toolOutput && window.openai.toolOutput.structuredContent;
    
    if (data) {
      const widget = document.getElementById('decision-widget');
      
      let html = '<div class="decision-card">';
      html += '<h2>Decision Recorded</h2>';
      
      if (data.context) {
        html += '<div class="section">';
        html += '<div class="label">Context</div>';
        html += '<div class="content">' + escapeHtml(data.context) + '</div>';
        html += '</div>';
      }
      
      if (data.decision) {
        html += '<div class="section">';
        html += '<div class="label">Decision</div>';
        html += '<div class="content">' + escapeHtml(data.decision) + '</div>';
        html += '</div>';
      }
      
      if (data.options_considered && data.options_considered.length > 0) {
        html += '<div class="section">';
        html += '<div class="label">Options Considered</div>';
        html += '<ul class="options">';
        data.options_considered.forEach(opt => {
          html += '<li>' + escapeHtml(opt) + '</li>';
        });
        html += '</ul>';
        html += '</div>';
      }
      
      if (data.implications) {
        html += '<div class="section">';
        html += '<div class="label">Implications</div>';
        html += '<div class="content">' + escapeHtml(data.implications) + '</div>';
        html += '</div>';
      }
      
      if (data.timestamp) {
        html += '<div class="timestamp">Recorded: ' + escapeHtml(data.timestamp) + '</div>';
      }
      
      html += '</div>';
      
      widget.innerHTML = html;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
